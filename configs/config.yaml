##############################################
# DATASET
##############################################

data_root: "conversational_dataset_v2"

sample_rate: 16000

segment_seconds: 3

max_sources: 4

##############################################
# DATALOADER
##############################################

train_batch_size: 2

val_batch_size: 2

shuffle: true

drop_last: true

num_workers: 4

##############################################
# TRAINING
##############################################

epochs: 25

learning_rate: 0.0003

weight_decay: 0.00001

optimizer: "AdamW"

gradient_clip: 5.0

gradient_accumulation_steps: 2

seed: 42

##############################################
# MODEL
##############################################

model:

  name: "ResearchDPRNN"

  encoder_dim: 128

  encoder_kernel_size: 16

  encoder_stride: 8

  bottleneck_dim: 128

  hidden_size: 128

  num_layers: 2

  num_blocks: 4

  dropout: 0.10

  bidirectional: true

  chunk_sizes:

    - 64

    - 128

    - 256

  hop_ratio: 0.5

##############################################
# VALIDATION
##############################################

validation:

  interval_type: "steps"

  every_n_steps: 250

##############################################
# CHECKPOINTS
##############################################

checkpoint_dir: "../checkpoints"

##############################################
# LOGGING
##############################################

log_dir: "../runs"

report_dir: "../reports"